AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AquaMind AI — serverless water infrastructure intelligence platform

Globals:
  Function:
    Runtime: python3.11
    Environment:
      Variables:
        TABLE_PREFIX: !Ref TablePrefix
        BEDROCK_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
        LOG_LEVEL: INFO

Parameters:
  TablePrefix:
    Type: String
    Default: aquamind
    Description: Prefix for all DynamoDB table names

  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

# ─────────────────────────────────────────────
# Lambda Functions
# ─────────────────────────────────────────────
Resources:

  ApiHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub aquamind-api-handler-${Environment}
      CodeUri: ../backend/
      Handler: app.main.handler
      MemorySize: 512
      Timeout: 29
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub ${TablePrefix}-Pipes
        - DynamoDBCrudPolicy:
            TableName: !Sub ${TablePrefix}-Readings
        - DynamoDBCrudPolicy:
            TableName: !Sub ${TablePrefix}-Alerts
        - DynamoDBCrudPolicy:
            TableName: !Sub ${TablePrefix}-SimulationResults
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
      Events:
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref AquaMindApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref AquaMindApi
            Path: /
            Method: ANY

  AnomalyDetectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub aquamind-anomaly-detector-${Environment}
      CodeUri: ../backend/
      Handler: detector.handler.handler
      MemorySize: 256
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub ${TablePrefix}-Readings
        - DynamoDBCrudPolicy:
            TableName: !Sub ${TablePrefix}-Alerts
      Events:
        ScheduledDetection:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Name: !Sub aquamind-detector-schedule-${Environment}
            Description: Run anomaly detection every 5 minutes
            Enabled: true

# ─────────────────────────────────────────────
# API Gateway
# ─────────────────────────────────────────────

  AquaMindApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub aquamind-api-${Environment}
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      AccessLogSetting:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
      MethodSettings:
        - ResourcePath: /*
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: false
          MetricsEnabled: true

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/aquamind-${Environment}
      RetentionInDays: 30

  ApiHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/aquamind-api-handler-${Environment}
      RetentionInDays: 30

  DetectorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/aquamind-anomaly-detector-${Environment}
      RetentionInDays: 30


# ─────────────────────────────────────────────
# DynamoDB Tables
# ─────────────────────────────────────────────

  PipesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${TablePrefix}-Pipes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pipe_id
          AttributeType: S
      KeySchema:
        - AttributeName: pipe_id
          KeyType: HASH

  ReadingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${TablePrefix}-Readings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pipe_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: processed
          AttributeType: S
      KeySchema:
        - AttributeName: pipe_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: processed-timestamp-index
          KeySchema:
            - AttributeName: processed
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  AlertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${TablePrefix}-Alerts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: alert_id
          AttributeType: S
        - AttributeName: pipe_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: alert_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: pipe-timestamp-index
          KeySchema:
            - AttributeName: pipe_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  SimulationResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${TablePrefix}-SimulationResults
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: simulation_id
          AttributeType: S
      KeySchema:
        - AttributeName: simulation_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true


# ─────────────────────────────────────────────
# Frontend: S3 + CloudFront
# ─────────────────────────────────────────────

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub aquamind-frontend-${Environment}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub AquaMind AI frontend OAI (${Environment})

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: !Sub AquaMind AI Dashboard (${Environment})
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOAI}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          AllowedMethods: [GET, HEAD, OPTIONS]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100

# ─────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${AquaMindApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}

  DashboardUrl:
    Description: CloudFront distribution URL for the React dashboard
    Value: !Sub https://${CloudFrontDistribution.DomainName}

  FrontendBucketName:
    Description: S3 bucket name for frontend deployment
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (needed for cache invalidation)
    Value: !Ref CloudFrontDistribution
